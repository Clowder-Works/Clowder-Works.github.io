<script>
  // Assemble all footer email links from parts — never in raw HTML
  (function(){
    const u='clowder.works', d='gmail.com';
    const display=u+'[at]'+d;
    const href='mailto:'+u+'@'+d;

    document.querySelectorAll('.footer-email-link').forEach(a=>{
      a.href=href;
    });
    document.querySelectorAll('.footer-email-text').forEach(el=>{
      el.textContent=display;
    });
    document.querySelectorAll('.footer-contact-link').forEach(a=>{
      a.href=href;
      a.textContent=display;
    });
    document.querySelectorAll('.footer-bottom-email').forEach(p=>{
      p.innerHTML+='<a href="'+href+'">'+display+'</a>';
    });
  })();
</script>
